  <line x1="19" y1="18" x2="27" y2="8" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Shovel blade -->
  <path d="M25 7 L29 6 L30 8 L26 9 Z" fill="#a8a29e"/>
